<script>
  /* 🔑 ACCESS CONTROL LOGIC */
/* 🔑 UPDATED ACCESS CONTROL */
function verifyRoll(event) {
    // This stops the "Proceed" click from triggering the music immediately
    if (event) event.stopPropagation(); 

    const suffix = document.getElementById("rollSuffix").value.trim();
    if (suffix === "425" || suffix === "427") {
        document.getElementById("loginOverlay").style.display = "none"; 
        // This reveals the "Tap to Start" screen
        document.getElementById("mainContent").style.display = "block";
    } else {
        showErrorPage();
    }
}


function handleCancel() { showErrorPage(); }

function showErrorPage() {
    document.body.innerHTML = `
        <div style="text-align:center; margin-top:20%; font-family: sans-serif; background: #fff; height: 100vh; width:100vw; position:fixed; inset:0; z-index:10000;">
            <h1 style="font-size:72px; color:#555; margin:0;">404</h1>

            <p style="color:#aaa;">Directory: /internal/student_portal/index.php</p>
        </div>
    `;
}

// Allow pressing "Enter" to proceed
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("rollSuffix").addEventListener("keypress", (e) => {
        if (e.key === "Enter") verifyRoll();
    });
});

/* ⭐ STARS */
const stars = document.getElementById("stars");
for (let i = 0; i < 70; i++) {
  const s = document.createElement("div");

  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  s.style.animationDuration = (6 + Math.random() * 6) + "s";
  stars.appendChild(s);
}

/* ✨ SPARKLES */
function createSparkles() {
  for (let i = 0; i < 40; i++) {
    const sp = document.createElement("div");
    sp.className = "sparkle";
    sp.style.left = "50%";
    sp.style.top = "50%";
    sp.style.setProperty("--x", (Math.random()*300 - 150) + "px");
    sp.style.setProperty("--y", (Math.random()*300 - 150) + "px");
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 1800);
  }
}

/* 🎵 MUSIC & TEXT SYNCED START */

music.load();

/* 🎵 THE MUSIC TRIGGER */
async function startExperience() {
  if (started) return;
  
  const overlay = document.getElementById("loginOverlay");
  // Ensure we only start if the login is hidden
  if (overlay.style.display === "none") {
      started = true;
      document.getElementById("tapToStart").style.display = "none";
      try {
        await music.play();
        showLine();
      } catch (err) {
        console.log("Audio blocked, starting text anyway");
        showLine();
      }
  }
}

// Re-attach the event listeners for both click and touch

document.addEventListener("touchstart", startExperience);



/* 📝 TEXT */
const lines = [
  "Hii... Naku chinna help kaavali chesthaava pls..??",
  "Today is 10th April..",
  "Em ledhu ee roju mana class lo oka ammayii birthday😌..",

  "To someone I have known for about an year..",

  "To someone who is never selfish..",

];

let i = 0;
const lineDiv = document.getElementById("line");

function handWrite(dummyText, callback) {
  let idx = 0;
  const baseText = "Wishing you many more happy returns of the day ";
  
  // 🎬 REVISED ORDER: Japanese -> Hindi -> Malayalam -> Kannada -> Tamil -> Telugu -> English
  const names = [
    "チャイタニヤ", // Japanese
    "चैतन्या",      // Hindi
    "ചൈതന്യ",      // Malayalam
    "ಚೈತನ್ಯ",      // Kannada
    "சைதன்யா",      // Tamil
    "చైతన్య",      // Telugu
    "Chaitanya"    // English Finale
  ]; 
  
  lineDiv.innerHTML = `<span class="handwrite"></span><span class="cursor">✍️</span>`;
  const span = lineDiv.querySelector(".handwrite");

  function type() {
    if (idx < baseText.length) {
      span.innerHTML += baseText.charAt(idx);
      idx++;
      setTimeout(type, 110); 
    } else {
      let nameIdx = 0;
      
      // 🎬 CINEMATIC FLICKER LOGIC
      const flickerInterval = setInterval(() => {
        // Find or create the name container
        let nameSpan = span.querySelector(".flicker-name");
        if (!nameSpan) {
          nameSpan = document.createElement("span");
          nameSpan.className = "flicker-name";
          span.appendChild(nameSpan);
        }
        
        nameSpan.innerHTML = names[nameIdx];

        if (nameIdx < names.length - 1) {
          nameIdx++;
        } else {
          // 🏁 STOP THE FLICKER ON "Chaitanya"
          clearInterval(flickerInterval);
          
          // Wait for the name to settle before adding emojis
          setTimeout(() => {
            if(lineDiv.querySelector(".cursor")) lineDiv.querySelector(".cursor").remove();
            span.innerHTML += " 🥳🥳💐💐";
            createSparkles();
            
            // Keep the full line on screen for 4.2s
            setTimeout(callback, 4200);
          }, 1000); 
        }
      }, 800); // 🕒 0.8s is the perfect "cinematic" speed
    }
  }
  type();
}



/* 📝 UPDATED MAGICAL SHOWLINE FUNCTION */
function showLine() {
    if (i >= lines.length) {
    music.pause();
    setTimeout(() => {
        // 1. Screen turns black
        document.getElementById("blackout").classList.add("show");
        
        // 2. Show the Telugu Replay Button after a 2-second pause
        setTimeout(() => {
            const btn = document.getElementById("replayBtn");
            btn.style.display = "block";
            // Trigger the fade-in
            setTimeout(() => { btn.style.opacity = "1"; }, 100);
        }, 2000); 
        
    }, 800);
    return;
}


  // Clear previous classes
  lineDiv.className = "";
  
  // ✍️ Keep handwriting line exactly as it was
  if (lines[i] === "__HANDWRITE__") {
    lineDiv.style.transform = "none";
    lineDiv.style.filter = "none";
    lineDiv.style.opacity = 1;
    
    handWrite("", () => {
        setTimeout(() => {
          lineDiv.classList.add("magical-hide"); 
          i++;
          setTimeout(showLine, 2000);
        }, 2500);
    });
    return;
  }

  // 🌟 Magical animation for all other lines
  lineDiv.innerHTML = lines[i];
  
  // Trigger Entrance (Blur to Clear)
  setTimeout(() => {
    lineDiv.classList.add("magical-show");
  }, 100);

  // Trigger Exit (Blur Out)
  setTimeout(() => {
    lineDiv.classList.remove("magical-show");
    lineDiv.classList.add("magical-hide");
  }, 4000);

  // Move to next line
  setTimeout(() => {
    i++;
    showLine();
  }, 5500); 
}
