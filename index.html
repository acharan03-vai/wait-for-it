<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">

<style>
/* 1. STYLING THE MAGICAL CONTENT */
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
  font-family: 'Dancing Script', cursive;
}
body {
  margin: 0; min-height: 100vh;
  background-image: linear-gradient(rgba(0, 0, 0, 0.70), rgba(0, 0, 0, 0.70)),url("./1.avif");
  background-size: cover; background-position: center; display: flex;
  justify-content: center; align-items: center;
}
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
#tapToStart {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  font-size: 16px; color: #f5e6a8; text-align: center; z-index: 5; animation: blink 1.5s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.star {
  position: absolute; width: 6px; height: 6px; border-radius: 50%; background: white;
  box-shadow: 0 0 12px white, 0 0 30px gold; animation: floatStar linear infinite, twinkle 2.5s ease-in-out infinite;
}
@keyframes floatStar { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }
@keyframes twinkle { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
.sparkle {
  position: absolute; width: 6px; height: 6px; background: gold; border-radius: 50%;
  pointer-events: none; box-shadow: 0 0 15px gold, 0 0 30px orange; animation: sparkleMove 1.8s ease-out forwards;
}
@keyframes sparkleMove { from { transform: scale(1) translate(0,0); opacity: 1; } to { transform: scale(0) translate(var(--x), var(--y)); opacity: 0; } }
#container { text-align: center; color: #f5e6a8; text-shadow: 0 0 8px rgba(255, 215, 100, 0.6); max-width: 90%; z-index: 2; }
.highlight { color: #ffd700; font-size: 1.5em; font-weight: 600; text-shadow: 0 0 6px #ffd700; }
.handwrite { font-size: 1.6rem; color: #fff3b0; text-shadow: 0 0 35px gold, 0 0 70px orange; }
.cursor { display: inline-block; margin-left: 5px; animation: blink 1s infinite; }
#line { font-size: 1.35rem; line-height: 1.7; opacity: 0; transition: all 1.5s ease; transform: translateY(10px); filter: blur(5px); }
.magical-show { opacity: 1 !important; transform: translateY(0) !important; filter: blur(0) !important; text-shadow: 0 0 15px gold; }
.magical-hide { opacity: 0 !important; transform: translateY(-10px) !important; filter: blur(10px) !important; }
.flicker-name { color: #ffd700; font-weight: bold; text-shadow: 0 0 25px gold; display: inline-block; }
#blackout { position: fixed; inset: 0; background: black; opacity: 0; pointer-events: none; transition: opacity 3.5s ease; z-index: 20; }
#blackout.show { opacity: 1; }
#replay-hint { position: fixed; bottom: 35%; left: 50%; transform: translateX(-50%); color: #ffd700; font-size: 22px; text-align: center; display: none; z-index: 1000; }
</style>
</head>

<body>

<!-- 🔒 STEP 1: THE FORMAL LOGIN (WHITE SCREEN) -->
<div id="loginOverlay" style="position:fixed; inset:0; background:#ffffff; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; font-family: sans-serif;">
    <div style="text-align:center; padding:20px;">
        <h2 style="color:#2c3e50; font-weight:500; margin-bottom:10px;">Hlo👋👋.. Kindly enter your roll no.</h2>
        <p style="color:#7f8c8d; font-size:14px; margin-bottom:25px;">Ex: 24AK1A0XXX</p>
        <div style="display:flex; align-items:center; border:1px solid #bdc3c7; border-radius:4px; overflow:hidden; width:300px; margin: 0 auto; background:#f9f9f9;">
            <span style="padding:12px; background:#ecf0f1; color:#34495e; font-weight:600; border-right:1px solid #bdc3c7; font-size:16px;">24AK1A0</span>
            <input type="text" id="rollSuffix" maxlength="3" placeholder="XXX" style="flex:1; border:none; outline:none; padding:12px; font-size:18px; font-weight:600; letter-spacing:3px; text-align:center;">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 25px; width: 300px; margin: 25px auto 0 auto;">
            <button onclick="handleCancel()" style="flex: 1; padding: 12px; background: #fdfdfd; color: #7f8c8d; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 14px; cursor: pointer;">CANCEL</button>
            <button onclick="verifyRoll()" style="flex: 2; padding: 12px; background: #2c3e50; color: #ffffff; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 1px;">PROCEED</button>
        </div>
        <p style="margin-top:20px; font-size:11px; color:#bdc3c7;">Verification System v1.0.4 | Dept of Engineering</p>
    </div>
</div>

<!-- 🎁 STEP 2: THE BIRTHDAY CONTENT (HIDDEN UNTIL LOGIN) -->
<div id="mainContent" style="display:none; width:100%; height:100%;">
    <div id="tapToStart">Tap anywhere to start music 🎵🎵</div>
    <div class="stars" id="stars"></div>
    <div id="container"><div id="line"></div></div>
    <div id="blackout"></div>
    <audio id="bgm" src="tanya.mp3" preload="auto" loop></audio>
    <div id="replay-hint">Malli chudaala..?? 🌟🌟<span>Tap the screen thrice ✨✨</span></div>
</div>

<script>
// --- ACCESS LOGIC ---
function verifyRoll() {
    const suffix = document.getElementById("rollSuffix").value.trim();
    if (suffix === "425" || suffix === "427") {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
    } else {
        showErrorPage();
    }
}
function handleCancel() { showErrorPage(); }
function showErrorPage() {
    document.body.innerHTML = `<div style="text-align:center; margin-top:20%; font-family: sans-serif; background: #fff; height: 100vh; width:100vw; position:fixed; inset:0; z-index:10000;">
        <h1 style="font-size:72px; color:#555; margin:0;">404</h1>
        <p style="font-size:24px; color:#888;">The page you were trying to reach doesn't exist.</p>
        <p style="color:#aaa;">Directory: /internal/student_portal/index.php</p>
    </div>`;
}

// --- STARS & SPARKLES ---
const stars = document.getElementById("stars");
for (let i = 0; i < 70; i++) {
  const s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  s.style.animationDuration = (6 + Math.random() * 6) + "s";
  stars.appendChild(s);
}
function createSparkles() {
  for (let i = 0; i < 40; i++) {
    const sp = document.createElement("div");
    sp.className = "sparkle";
    sp.style.left = "50%"; sp.style.top = "50%";
    sp.style.setProperty("--x", (Math.random()*300 - 150) + "px");
    sp.style.setProperty("--y", (Math.random()*300 - 150) + "px");
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 1800);
  }
}

// --- MUSIC & REVEAL ---
const music = document.getElementById("bgm");
const tapText = document.getElementById("tapToStart");
let started = false;

document.addEventListener("click", () => {
    // Only start if login is gone and we haven't started yet
    if (!started && document.getElementById("loginOverlay").style.display === "none") {
        started = true;
        tapText.style.display = "none";
        music.play().catch(() => {});
        showLine();
    }
});

const lines = [
  "Hii... Naku chinna help kaavali chesthaava pls..??", "Today is 10th April..",
  "Em ledhu ee roju mana class lo oka ammayii birthday😌..", "So konchem naa wishes thanaki convey chesthaava pls..",
  "Thanu..Yevaro telusa neeku..🤨🤨", "<span class='highlight'>C</span>huseki chaala silent gaa untundhi, but from",
  "<span class='highlight'>H</span>eart chaala ante chaala manchidhi..", "<span class='highlight'>A</span>anandhanga frnds tho kalisi muchatlo petukovadam ante chaaala",
  "<span class='highlight'>I</span>stam , andharu manchiga undaali ane korukuntundhi..", "<span class='highlight'>T</span>hanu baadhalo unaa sare just oka smile ichi move on aipothundhi..",
  "<span class='highlight'>A</span>mazing character.. Totally different and matured", "<span class='highlight'>N</span>aaku telisinantha varaku thanaki ZERO EGO",
  "<span class='highlight'>Y</span>e okarini mosam cheyadhu, chaala loyal.. Thanu", "<span class='highlight'>A</span>nukunte thanakana best inkevaaru undaaru..",
  "To someone I have known for about an year..", "To someone whom I have rarely seen on an angry mode..",
  "To someone who is never selfish..", "To someone who is always humble and kind..",
  "To that one particular person who hasn't changed with time..", "And most importantly..",
  "To my friend..", "__HANDWRITE__", "May you be blessed with THE BEST things in your life..",
  "May all your dreams come true.. Still a long way to go..", "Health jaagratha..",
  "Yeppudu ye vishayam gurinchi alochinchi low ga feel avaku..", "Yedhi jarigina mana manchike jaruguthundhi ani positive gaa tisko..",
  "And like always… Be happy.. Have that smile on your face.", "Never let anything / anyone fade it away.",
  "Ok na...", "All the very best for ur life...", "Always be strong..",
  "Enjoy every single moment of ur life..", " Because the sweetest memories are from.. ", " The smallest moments.. ", "Byeee.. Enjoy your day..."
];

let i = 0;
const lineDiv = document.getElementById("line");

function handWrite(dummyText, callback) {
  let idx = 0; const baseText = "Wishing you many more happy returns of the day ";
  const names = ["チャイタニヤ", "चैतन्या", "ചൈതന്യ", "ಚೈತನ್ಯ", "சைதன்யா", "చైతన్య", "Chaitanya"];
  lineDiv.innerHTML = `<span class="handwrite"></span><span class="cursor">✍️</span>`;
  const span = lineDiv.querySelector(".handwrite");
  function type() {
    if (idx < baseText.length) { span.innerHTML += baseText.charAt(idx); idx++; setTimeout(type, 110);
    } else {
      let nameIdx = 0; const flickerInterval = setInterval(() => {
        let nameSpan = span.querySelector(".flicker-name") || document.createElement("span");
        nameSpan.className = "flicker-name"; span.appendChild(nameSpan);
        nameSpan.innerHTML = names[nameIdx];
        if (nameIdx < names.length - 1) { nameIdx++; } else {
          clearInterval(flickerInterval);
          setTimeout(() => { 
            if(lineDiv.querySelector(".cursor")) lineDiv.querySelector(".cursor").remove();
            span.innerHTML += " 🥳🥳💐💐"; createSparkles(); setTimeout(callback, 4200); 
          }, 1000);
        }
      }, 800);
    }
  }
  type();
}

function showLine() {
  if (i >= lines.length) { music.pause(); document.getElementById("blackout").classList.add("show"); setTimeout(() => { document.getElementById("replay-hint").style.display = "block"; }, 1000); return; }
  lineDiv.className = "";
  if (lines[i] === "__HANDWRITE__") {
    lineDiv.style.opacity = 1; lineDiv.style.filter = "none";
    handWrite("", () => { lineDiv.classList.add("magical-hide"); i++; setTimeout(showLine, 2000); });
    return;
  }
  lineDiv.innerHTML = lines[i];
  setTimeout(() => { lineDiv.classList.add("magical-show"); }, 100);
  setTimeout(() => { lineDiv.classList.remove("magical-show"); lineDiv.classList.add("magical-hide"); }, 4000);
  setTimeout(() => { i++; showLine(); }, 5500);
}

// Enter key support
document.getElementById("rollSuffix").addEventListener("keypress", (e) => { if (e.key === "Enter") verifyRoll(); });
// Triple tap replay
let tCount = 0; let tTimer;
document.addEventListener("touchstart", () => {
  tCount++; clearTimeout(tTimer); tTimer = setTimeout(() => { tCount = 0; }, 500);
  if (tCount === 3) location.reload();
});
</script>
</body>
</html>
